name: Build and Publish image to Docker Hub

on:
  push:
    branches: [ "main", "dev-server", "staging-server" ]
  pull_request:
    branches: [ "main", "dev-server", "staging-server" ]

jobs:
  publish_images:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set version and branch tag
      run: |
        echo "GIT_COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
        echo "VERSION=v1.${{ github.run_number }}" >> $GITHUB_ENV

        # Sanitize branch name (lowercase + replace slashes)
        BRANCH_NAME="${{ github.ref_name }}"
        SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | tr '/' '-')
        echo "BRANCH_TAG=${SAFE_BRANCH_NAME}" >> $GITHUB_ENV

    - name: Build Docker image
      run: |
        docker build -t "${{ secrets.IMAGE_NAME }}:${BRANCH_TAG}" -t "${{ secrets.IMAGE_NAME }}:${GIT_COMMIT_SHA}" .

    ####
    - name: Debug secrets visibility
      run: |
        echo "Username: ${{ secrets.DOCKER_HUB_USERNAME }}"
        if [ -z "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
          echo "❌ Token is missing or empty"
        else
          echo "✅ Token detected (hidden for security)"
        fi

      ####
    # - name: Push Docker image to Docker Hub
    #   if: github.event_name == 'push'
    #   run: |
    #     echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin
    #     docker push "${{ secrets.IMAGE_NAME }}:${BRANCH_TAG}"
    #     docker push "${{ secrets.IMAGE_NAME }}:${GIT_COMMIT_SHA}"
    - name: Login to Docker Hub
      if: github.event_name == 'push'
      env:
        DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
        DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
      run: |
        if [ -z "$DOCKER_HUB_TOKEN" ]; then
          echo "❌ DOCKER_HUB_TOKEN is missing. Please set it in repository secrets."
          exit 1
        fi

        echo "Logging in to Docker Hub as $DOCKER_HUB_USERNAME..."
        echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin docker.io
        echo "✅ Logged in successfully"


    - name: Clean up old Docker tags (keep last 10)
      if: github.event_name == 'push'
      env:
        DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
        DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
        BRANCH_TAG: ${{ env.BRANCH_TAG }}
      run: |
        echo "Cleaning up old Docker tags for $IMAGE_NAME:$BRANCH_TAG ..."

        # Get all tags for this image
        TAGS=$(curl -s -u "${DOCKER_HUB_USERNAME}:${DOCKER_HUB_TOKEN}" "https://hub.docker.com/v2/repositories/${IMAGE_NAME}/tags/?page_size=100" \
          | jq -r '.results[].name' | grep -E "^${BRANCH_TAG}|^[0-9a-f]{7,}$" | sort)

        # Keep only the latest 10 tags for this branch
        TAGS_TO_DELETE=$(echo "$TAGS" | head -n -10)

        if [ -z "$TAGS_TO_DELETE" ]; then
          echo "✅ Nothing to clean up. Less than 10 tags found."
        else
          echo "🧹 Deleting old tags:"
          echo "$TAGS_TO_DELETE"
          for tag in $TAGS_TO_DELETE; do
            curl -s -X DELETE -u "${DOCKER_HUB_USERNAME}:${DOCKER_HUB_TOKEN}" \
              "https://hub.docker.com/v2/repositories/${IMAGE_NAME}/tags/${tag}/" > /dev/null
          done
          echo "✅ Cleanup complete."
        fi































