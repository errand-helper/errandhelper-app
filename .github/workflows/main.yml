name: Build and Publish image to Docker Hub

on:
  push:
    branches: [ "main", "dev-server", "staging-server" ]
  pull_request:
    branches: [ "main", "dev-server", "staging-server" ]

jobs:
  publish_images:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set version and branch tag
      run: |
        echo "GIT_COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
        echo "VERSION=v1.${{ github.run_number }}" >> $GITHUB_ENV

        # Sanitize branch name (lowercase + replace slashes)
        CURRENT_BRANCH="${{ github.ref_name }}"
        SAFE_BRANCH=$(echo "$CURRENT_BRANCH" | tr '[:upper:]' '[:lower:]' | tr '/' '-')

        # Detect PR merge branch name or number
        if [[ "${GITHUB_HEAD_REF}" != "" ]]; then
          # If this is a PR, GITHUB_HEAD_REF holds the source branch (e.g. 19-merge)
          SOURCE_BRANCH="${GITHUB_HEAD_REF}"
        else
          # If this is a direct push, fall back to the current branch
          SOURCE_BRANCH="${SAFE_BRANCH}"
        fi

        SAFE_SOURCE=$(echo "$SOURCE_BRANCH" | tr '[:upper:]' '[:lower:]' | tr '/' '-')

        # Combine both
        if [[ "$SAFE_BRANCH" == "main" ]]; then
          TAG="${SAFE_SOURCE}-main"
        else
          TAG="${SAFE_BRANCH}-${SAFE_SOURCE}"
        fi

        echo "BRANCH_TAG=$TAG" >> $GITHUB_ENV
        echo "✅ Using tag: $TAG"


    # - name: Set version and branch tag
    #   run: |
    #     echo "GIT_COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
    #     echo "VERSION=v1.${{ github.run_number }}" >> $GITHUB_ENV

    #     # Sanitize branch name (lowercase + replace slashes)
    #     BRANCH_NAME="${{ github.ref_name }}"
    #     SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | tr '/' '-')
    #     echo "BRANCH_TAG=${SAFE_BRANCH_NAME}" >> $GITHUB_ENV

    - name: Build Docker image
      run: |
        docker build -t "${{ secrets.IMAGE_NAME }}:${BRANCH_TAG}" -t "${{ secrets.IMAGE_NAME }}:${GIT_COMMIT_SHA}" .

    - name: Login and Push Docker image
      env:
        DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
        DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
        BRANCH_TAG: ${{ env.BRANCH_TAG }}
        GIT_COMMIT_SHA: ${{ env.GIT_COMMIT_SHA }}
      run: |
        echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin docker.io

        echo "✅ Logged in successfully, pushing images..."
        docker push "$IMAGE_NAME:$BRANCH_TAG"
        docker push "$IMAGE_NAME:$GIT_COMMIT_SHA"


































