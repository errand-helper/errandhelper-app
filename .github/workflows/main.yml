name: Build and Publish image to Docker Hub

on:
  push:
    branches: [ "main", "dev-server", "staging-server" ]
  pull_request:
    branches: [ "main", "dev-server", "staging-server" ]

jobs:
  publish_images:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set version and branch tag
      run: |
        echo "GIT_COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
        echo "VERSION=v1.${{ github.run_number }}" >> $GITHUB_ENV

        # Sanitize branch name (lowercase + replace slashes)
        BRANCH_NAME="${{ github.ref_name }}"
        SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | tr '/' '-')
        echo "BRANCH_TAG=${SAFE_BRANCH_NAME}" >> $GITHUB_ENV

    - name: Build Docker image
      run: |
        docker build -t "${{ secrets.IMAGE_NAME }}:${BRANCH_TAG}" -t "${{ secrets.IMAGE_NAME }}:${GIT_COMMIT_SHA}" .

    - name: Login to Docker Hub Push Docker image
      run: |
       echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin docker.io
       docker push ${{secrets.IMAGE_NAME}}:${BRANCH_TAG}
       docker push ${{ secrets.IMAGE_NAME }}:${GIT_COMMIT_SHA}


































