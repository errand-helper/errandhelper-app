
<main>
  <div class="container">
    <section
      class="min-vh-100 d-flex flex-column align-items-center justify-content-center py-4"
    >
      <div class="container">
        <div class="row justify-content-center">
          <div
            class="col-lg-6 col-md-6 d-flex flex-column align-items-center justify-content-center"
          >
            <div class="card mb-3">
              <div class="card-body">
                <div class="navbar-brand">
                  <a class="" href="#">
                    <i class="fas fa-running me-2"></i>ErrandHub
                  </a>
                </div>

                <div class="p-4">
                  <form
                    class="row g-3 needs-validation"
                    [formGroup]="loginForm"
                    (ngSubmit)="loginUser()"
                  >
                  <div class="col-12">
                    <label for="yourEmail" class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required formControlName="email">
                    <div class="invalid-feedback" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">Please enter your email.</div>
                  </div>
                  <div class="col-12">
                    <label for="yourPassword" class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required formControlName="password">
                    <div class="invalid-feedback" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">Please enter your password.</div>
                  </div>
                    
                    <div class="col-12">
                      <button [disabled]="loginForm.invalid" class="btn create-btn w-100" type="submit">
                        Login
                      </button>
                    </div>
                    <div class="col-12">
                      <p class="mb-0" style="font-size: 16px;">
                        Already have an account?
                        <a routerLink="/authentication/register" style="color: var(--primary-blue);font-weight: 600;">Register</a>
                      </p>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>
