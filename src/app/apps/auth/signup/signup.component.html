<div class="signup-container">
    <div class="signup-title">Create Your Account</div>
    <div class="signup-subtitle">Join ErrandEscrow for secure, reliable errand services</div>
    <form>
      <label for="userType">Select User Type</label>
      <select id="userType" name="userType" required>
        <option value="Customer">Customer</option>
        <option value="Business">Business</option>
      </select>

      <!-- Customer Fields -->
      <div id="customerFields">
        <label for="customerFirstName">First Name</label>
        <input type="text" id="customerFirstName" name="customerFirstName" required>

        <label for="customerLastName">Last Name</label>
        <input type="text" id="customerLastName" name="customerLastName" required>

        <label for="customerEmail">Email</label>
        <input type="email" id="customerEmail" name="customerEmail" required>

        <label for="customerIdNumber">ID Number</label>
        <input type="text" id="customerIdNumber" name="customerIdNumber" required>

        <label for="customerPassword">Password</label>
        <input type="password" id="customerPassword" name="customerPassword" required>

        <label for="customerConfirmPassword">Confirm Password</label>
        <input type="password" id="customerConfirmPassword" name="customerConfirmPassword" required>
      </div>

      <!-- Business Fields -->
      <div id="businessFields" class="hidden">
        <label for="businessFirstName">First Name</label>
        <input type="text" id="businessFirstName" name="businessFirstName" required>

        <label for="businessLastName">Last Name</label>
        <input type="text" id="businessLastName" name="businessLastName" required>

        <label for="businessEmail">Email</label>
        <input type="email" id="businessEmail" name="businessEmail" required>

        <label for="businessIdNumber">ID Number</label>
        <input type="text" id="businessIdNumber" name="businessIdNumber" required>

        <label for="businessRegNo">Business Reg No</label>
        <input type="text" id="businessRegNo" name="businessRegNo" required>

        <label for="businessName">Business Name</label>
        <input type="text" id="businessName" name="businessName" required>

        <label for="businessPassword">Password</label>
        <input type="password" id="businessPassword" name="businessPassword" required>

        <label for="businessConfirmPassword">Confirm Password</label>
        <input type="password" id="businessConfirmPassword" name="businessConfirmPassword" required>
      </div>

      <button type="submit" class="gold-btn">Sign Up</button>
    </form>
  </div>
