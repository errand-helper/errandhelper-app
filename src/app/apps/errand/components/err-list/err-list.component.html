<app-sidebar></app-sidebar>
<div class="main-content">
  <app-navbar></app-navbar>
  <div class="controls">
    <div class="controls-row">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Search by reference number, client name, or location..."
        />
      </div>

      <div class="filter-group">
        <select id="statusFilter">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="active">Active</option>
          <option value="completed">Completed</option>
        </select>


        <button class="btn-primary" routerLink="/business/list">Select Business</button>
      </div>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Reference Number</th>
          <th>
            <span *ngIf="isClient==='client'">Business Name</span>
            <span *ngIf="isClient==='business'">Client Name</span>
          </th>
          <th>Date Created</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr *ngFor="let errand of errands; let i=index">
          <td>{{i+1}}</td>
          <td>{{errand.reference_number}}</td>
          <td>
            <span *ngIf="isClient==='client'">{{errand.business_name}}</span>
            <span *ngIf="isClient==='business'">{{errand.client_name}}</span>
          </td>
          <td>{{errand.created_at | date:'longDate'}}</td>
          <td><span class="status-badge status-pending">{{errand.status}}</span></td>
          <td>
            <div class="action-buttons">
              <button class="btn btn-view">
                View
              </button>
              <button class="btn btn-accept">
                Accept
              </button>
              <button class="btn btn-reject">
                Reject
              </button>
              <button class="btn btn-delete">
                Delete
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
