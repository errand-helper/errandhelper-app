<div class="page-header" *ngIf="isCreateRoute">
  <button class="mobile-toggle mb-3" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
  </button>
  <h1 class="h3 mb-0">Create New Errand</h1>
  <p class="text-muted mb-0">
    Post your errand request and get it done by a trusted provider
  </p>
</div>

<div class="dashboard-header" *ngIf="!isCreateRoute">
  <div class="d-flex align-items-start">
    <button class="mobile-toggle" (click)="toggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>
  </div>
  <div class="user-info">
    <div class="user-avatar">JD</div>
  </div>
</div>
